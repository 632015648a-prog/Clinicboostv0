# Supabase local development configuration
# Docs: https://supabase.com/docs/guides/local-development

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323
api_url = "http://localhost"

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173/**",
  "http://localhost:5174/**",
  "http://localhost:5175/**",
  "http://127.0.0.1:5173/**",
  "http://127.0.0.1:5175/**",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true     # OBLIGATORIO según spec ClinicBoost
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false              # false solo en local/dev

[auth.sms]
enable_signup = false

# ─── Providers ───────────────────────────────────────────────────────────────
[auth.external.google]
enabled = false

[auth.external.github]
enabled = false

# Evita fallos de health check en Windows (Logflare/Analytics sin Docker tcp://2375).
# Ver: CLI warning "Analytics on Windows requires Docker daemon exposed on tcp://localhost:2375"
[analytics]
enabled = false
