# ─── Nginx: reverse-proxy de staging ─────────────────────────────────────────
#
# Arquitectura de staging (con Cloudflare como CDN/TLS):
#   [Internet] → Cloudflare (TLS) → Nginx :80
#                  ├─ /api/*        → cb_api:8080   (.NET Minimal API)
#                  ├─ /auth/*       → cb_api:8080
#                  ├─ /webhooks/*   → cb_api:8080
#                  ├─ /health/*     → cb_api:8080
#                  └─ /*            → cb_web:3000   (Nginx sirviendo SPA React)
#
# Si terminas TLS en este Nginx (sin Cloudflare):
#   - Añadir bloque server en :443 con ssl_certificate/ssl_certificate_key
#   - Redirigir :80 → :443
# ─────────────────────────────────────────────────────────────────────────────

# ── Upstream: API backend (.NET en contenedor cb_api) ────────────────────────
upstream clinicboost_api {
    server api:8080;
    keepalive 16;
}

# ── Upstream: Frontend React (Nginx en contenedor cb_web) ───────────────────
upstream clinicboost_web {
    server web:3000;
    keepalive 8;
}

# ── Rate limit zones (definidas aquí para ser accesibles desde location) ─────
# (Las zonas se definen en nginx.conf/http block; aquí solo se usan)

server {
    listen 80;
    server_name _;

    # ── Cabeceras de seguridad globales ──────────────────────────────────────
    add_header X-Frame-Options            "DENY"                            always;
    add_header X-Content-Type-Options     "nosniff"                         always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin"                     always;

    # ── Proxy → API backend ──────────────────────────────────────────────────
    # Rutas: /api/* /auth/* /webhooks/* /health/*
    location ~ ^/(api|auth|webhooks|health)/ {
        limit_req zone=api burst=10 nodelay;

        proxy_pass         http://clinicboost_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;

        # Ocultar cabeceras del backend
        proxy_hide_header  X-Powered-By;
        proxy_hide_header  Server;
    }

    # ── Webhooks Twilio (rate limit más permisivo) ────────────────────────────
    location /webhooks/ {
        limit_req zone=webhook burst=30 nodelay;

        proxy_pass         http://clinicboost_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
    }

    # ── SPA React (todo lo demás → cb_web) ───────────────────────────────────
    location / {
        proxy_pass         http://clinicboost_web;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ── Bloquear archivos ocultos y rutas sensibles ───────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location = /favicon.ico {
        proxy_pass http://clinicboost_web;
        access_log off;
        log_not_found off;
    }
}
