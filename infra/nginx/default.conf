# ─── Nginx: servidor SPA + reverse-proxy a la API ────────────────────────────
#
# Arquitectura de staging:
#   [Internet] → Nginx :443 (TLS terminado aquí o en Cloudflare)
#                  ├─ /api/*        → upstream clinicboost_api:8080
#                  ├─ /auth/*       → upstream clinicboost_api:8080
#                  ├─ /webhooks/*   → upstream clinicboost_api:8080
#                  ├─ /health/*     → upstream clinicboost_api:8080
#                  └─ /*            → SPA (index.html)
#
# TLS: si usas Cloudflare con proxy activado (modo "Full strict"),
#      este server puede escuchar en 80 y dejar que Cloudflare termine TLS.
# ─────────────────────────────────────────────────────────────────────────────

upstream clinicboost_api {
    server api:8080;
    keepalive 16;
}

server {
    listen 3000;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Cabeceras de seguridad (frontend estático) ───────────────────────────
    add_header X-Frame-Options            "DENY"                            always;
    add_header X-Content-Type-Options     "nosniff"                         always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin"                     always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; upgrade-insecure-requests" always;

    # ── Proxy → API backend ──────────────────────────────────────────────────
    location ~ ^/(api|auth|webhooks|health)/ {
        proxy_pass         http://clinicboost_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
        proxy_hide_header  X-Powered-By;
        proxy_hide_header  Server;
    }

    # ── Activos estáticos con caché larga (Vite genera hashes en filename) ───
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback (React Router) ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Bloquear archivos ocultos ────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
