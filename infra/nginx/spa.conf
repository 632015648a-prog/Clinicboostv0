# ─── infra/nginx/spa.conf ─────────────────────────────────────────────────────
#
# Configuración de Nginx para el contenedor cb_web (SPA React).
# Este Nginx sirve SOLO los ficheros estáticos del build de Vite.
# NO hace proxy a la API — eso lo hace el cb_nginx externo.
#
# Escucha en :3000 (interno Docker).
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 3000;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Cabeceras de seguridad para el HTML/SPA ──────────────────────────────
    add_header X-Frame-Options            "DENY"                            always;
    add_header X-Content-Type-Options     "nosniff"                         always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin"                     always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; upgrade-insecure-requests" always;

    # ── Assets estáticos con caché larga (Vite genera hashes en filename) ────
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback (React Router — todas las rutas → index.html) ───────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Bloquear archivos ocultos ────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
