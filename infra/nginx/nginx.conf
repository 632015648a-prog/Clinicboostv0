# ─── nginx.conf principal ─────────────────────────────────────────────────────
# Configuración de nivel global.
# La configuración de servidor (SPA + proxy API) va en conf.d/default.conf

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
}

http {
    include            /etc/nginx/mime.types;
    default_type       application/octet-stream;

    # Logging compacto (JSON compatible con Docker log drivers)
    log_format  main   '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time';

    access_log  /var/log/nginx/access.log main;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript
                       text/xml application/xml text/javascript
                       application/x-font-ttf font/opentype image/svg+xml;
    gzip_min_length    1000;
    gzip_proxied       any;
    gzip_vary          on;

    # Seguridad: no revelar versión de nginx
    server_tokens      off;

    # Límites básicos
    client_max_body_size  10M;
    client_body_timeout   30s;
    client_header_timeout 30s;
    send_timeout          30s;

    # Rate limiting básico (proteger API de abuso)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=120r/m;

    include /etc/nginx/conf.d/*.conf;
}
