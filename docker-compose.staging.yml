# ============================================================
# ClinicBoost — docker-compose.staging.yml
#
# Orquestación de staging: Nginx-frontal + API .NET
# La base de datos está en Supabase Cloud (no en Docker).
#
# ARQUITECTURA:
#
#   [Internet / Cloudflare]
#        │  :80 (Cloudflare termina TLS)
#        ▼
#   nginx (cb_nginx)  :80
#     ├─ /api/*        → api (cb_api) :8080
#     ├─ /auth/*       → api (cb_api) :8080
#     ├─ /webhooks/*   → api (cb_api) :8080
#     ├─ /health/*     → api (cb_api) :8080
#     └─ /*            → SPA React (servida desde cb_nginx)
#
#   La SPA se construye dentro del contenedor cb_nginx
#   (Dockerfile multi-stage: Node build → Nginx serve).
#   Los archivos estáticos se sirven directamente por Nginx,
#   no hay volumen compartido entre servicios.
#
# USO:
#   cp .env.staging.example .env.staging
#   nano .env.staging
#   docker compose -f docker-compose.staging.yml --env-file .env.staging up -d
#
# VER LOGS:
#   docker compose -f docker-compose.staging.yml logs -f
#
# PARAR:
#   docker compose -f docker-compose.staging.yml down
#
# NOTAS DE SEGURIDAD:
#   · Nunca commitear .env.staging al repositorio.
#   · En producción real, usar Docker Secrets o un vault (Vault, Infisical).
#   · Las cookies de sesión deben tener Secure=true y SameSite=Strict.
# ============================================================

name: clinicboost-staging

services:

  # ── Backend .NET API ─────────────────────────────────────────────────────────
  # Arranca primero; Nginx no levanta hasta que la API esté healthy.
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: clinicboost-api:staging
    container_name: cb_api
    restart: unless-stopped
    expose:
      - "8080"          # Solo accesible desde la red interna Docker
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ASPNETCORE_URLS: http://+:8080

      # ── Base de datos (Supabase Cloud) ──────────────────────────────────────
      ConnectionStrings__Supabase: ${DB_CONNECTION_STRING}

      # ── Supabase ────────────────────────────────────────────────────────────
      Supabase__Url:       ${SUPABASE_URL}
      Supabase__AnonKey:   ${SUPABASE_ANON_KEY}
      Supabase__JwtSecret: ${SUPABASE_JWT_SECRET}

      # ── CORS ────────────────────────────────────────────────────────────────
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_0}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_1:-""}

      # ── Twilio ──────────────────────────────────────────────────────────────
      Twilio__AccountSid:     ${TWILIO_ACCOUNT_SID}
      Twilio__AuthToken:      ${TWILIO_AUTH_TOKEN}
      Twilio__WebhookBaseUrl: ${TWILIO_WEBHOOK_BASE_URL}

      # ── IA — Agente conversacional (opcionales) ─────────────────────────────
      OpenAI__ApiKey:    ${OPENAI_API_KEY:-""}
      Anthropic__ApiKey: ${ANTHROPIC_API_KEY:-""}

      # ── CSP ─────────────────────────────────────────────────────────────────
      Csp__ReportUri:  ${CSP_REPORT_URI:-"/auth/csp-report"}
      Csp__ReportOnly: ${CSP_REPORT_ONLY:-"true"}

      # ── Logging ─────────────────────────────────────────────────────────────
      Serilog__MinimumLevel__Default: Information

    volumes:
      - ./logs/api:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - cb_net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ── Frontend React + Nginx ────────────────────────────────────────────────────
  # El Dockerfile multi-stage construye la SPA con Vite y la sirve con Nginx.
  # Las variables VITE_* se inyectan en build-time (no en runtime).
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_SUPABASE_URL:      ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_URL:           ${VITE_API_URL}
    image: clinicboost-web:staging
    container_name: cb_web
    restart: unless-stopped
    expose:
      - "3000"          # Solo accesible desde la red interna Docker
    volumes:
      - ./logs/nginx:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cb_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M

  # ── Nginx reverse-proxy ──────────────────────────────────────────────────────
  # Punto de entrada público. Enruta SPA → cb_web y API → cb_api.
  # Escucha en :80; si usas Cloudflare con "Full strict", él termina TLS.
  # Si no usas Cloudflare, descomentar el bloque :443 y añadir certificados.
  nginx:
    image: nginx:1.27-alpine
    container_name: cb_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # ─── HTTPS sin Cloudflare ───────────────────────────────────────────────
      # Descomentar si terminas TLS aquí (e.g., con Let's Encrypt + Certbot):
      # - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
      # ─── Certificados TLS (si terminas TLS en Nginx) ──────────────────────
      # - ./infra/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - cb_net

# ── Red interna Docker ────────────────────────────────────────────────────────
networks:
  cb_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
